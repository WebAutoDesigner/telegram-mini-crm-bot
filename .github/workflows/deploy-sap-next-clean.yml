name: Deploy detailing site

on:
  push:
    branches: [master]
    paths:
      - "sap-next-clean/**"
      - ".github/workflows/deploy-sap-next-clean.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: detailing-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sap-next-clean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sap-next-clean/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: "/telegram-mini-crm-bot"
        run: npm run build:pages

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ../pages || git init ../pages
          rm -rf ../pages/*
          cp -R out/. ../pages/
          touch ../pages/.nojekyll
          cd ../pages
          git add -A
          git commit -m "Deploy detailing site" || exit 0
          git branch -M gh-pages
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages --force
